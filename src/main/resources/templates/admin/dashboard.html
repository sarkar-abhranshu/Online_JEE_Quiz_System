<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin Dashboard</title>
        <link rel="stylesheet" th:href="@{/css/style.css}" />
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-container">
                <h1>Online JEE Quiz System</h1>
                <div class="nav-links">
                    <span th:text="'Welcome, ' + ${admin.name}"></span>
                    <a th:href="@{/logout}" class="btn btn-secondary">Logout</a>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="dashboard-header">
                <h2>Admin Dashboard</h2>
                <a th:href="@{/admin/create-quiz}" class="btn btn-primary">
                    Create New Quiz
                </a>
            </div>

            <div
                th:if="${success}"
                class="alert alert-success"
                th:text="${success}"
            ></div>
            <div
                th:if="${error}"
                class="alert alert-error"
                th:text="${error}"
            ></div>

            <div class="quiz-list">
                <h3>Your Quizzes</h3>

                <div th:if="${#lists.isEmpty(quizzes)}" class="empty-state">
                    <p>
                        No quizzes created yet. Click "Create New Quiz" to get
                        started!
                    </p>
                </div>

                <div class="quiz-grid">
                    <div th:each="quiz : ${quizzes}" class="quiz-card">
                        <div class="quiz-header">
                            <h4 th:text="${quiz.title}"></h4>
                            <span
                                th:class="${quiz.isActive} ? 'badge badge-active' : 'badge badge-inactive'"
                                th:text="${quiz.isActive} ? 'Active' : 'Inactive'"
                            >
                            </span>
                        </div>

                        <p
                            class="quiz-description"
                            th:text="${quiz.description}"
                        ></p>

                        <div class="quiz-info">
                            <p>
                                <strong>Duration:</strong>
                                <span
                                    th:text="${quiz.durationMinutes} + ' minutes'"
                                ></span>
                            </p>
                            <p>
                                <strong>Questions:</strong>
                                <span
                                    th:text="${#lists.size(quiz.questions)}"
                                ></span>
                            </p>
                            <p>
                                <strong>Total Marks:</strong>
                                <span th:text="${quiz.totalMarks}"></span>
                            </p>
                            <p>
                                <strong>Negative Marking:</strong>
                                <span th:text="${quiz.negativeMarkingDisplay}"></span>
                            </p>
                            <p>
                                <strong>Attempts:</strong>
                                <span
                                    th:text="${#lists.size(quiz.results)}"
                                ></span>
                            </p>
                        </div>

                        <div class="quiz-actions">
                            <a
                                th:href="@{/admin/add-question/{id}(id=${quiz.id})}"
                                class="btn btn-small"
                                >Add Questions</a
                            >
                            <a
                                th:href="@{/admin/analytics/{id}(id=${quiz.id})}"
                                class="btn btn-small"
                                >Analytics</a
                            >

                            <form
                                th:action="@{/admin/toggle-quiz/{id}(id=${quiz.id})}"
                                method="post"
                                style="display: inline"
                            >
                                <button
                                    type="submit"
                                    class="btn btn-small btn-secondary"
                                >
                                    <span
                                        th:text="${quiz.isActive} ? 'Deactivate' : 'Activate'"
                                    ></span>
                                </button>
                            </form>

                            <form
                                th:action="@{/admin/delete-quiz/{id}(id=${quiz.id})}"
                                method="post"
                                style="display: inline"
                            >
                                <button
                                    type="submit"
                                    class="btn btn-small btn-danger"
                                    onclick="return confirm('Delete this quiz and all related attempts/results?')"
                                >
                                    Delete
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Online JEE Quiz System</p>
        </footer>
    </body>
</html>
