<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz Analytics</title>
        <link rel="stylesheet" th:href="@{/css/style.css}" />
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-container">
                <h1>Online Quiz System</h1>
                <div class="nav-links">
                    <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Back to Dashboard</a>
                    <a th:href="@{/logout}" class="btn btn-secondary">Logout</a>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="dashboard-header">
                <h2>Analytics: <span th:text="${quiz.title}"></span></h2>
                <a th:href="@{/admin/add-question/{id}(id=${quiz.id})}" class="btn btn-primary">Manage Questions</a>
            </div>

            <!-- Summary Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 th:text="${totalAttempts}">0</h3>
                    <p>Total Attempts</p>
                </div>
                <div class="stat-card">
                    <h3 th:text="${#numbers.formatDecimal(averageScore, 1, 1)}">0.0</h3>
                    <p>Avg Score</p>
                </div>
                <div class="stat-card">
                    <h3 th:text="${#numbers.formatDecimal(averagePercentage, 1, 1)} + '%'">0.0%</h3>
                    <p>Avg Percentage</p>
                </div>
                <div class="stat-card">
                    <h3 th:text="${quiz.durationMinutes} + ' min'">0 min</h3>
                    <p>Duration</p>
                </div>
            </div>

            <!-- Results Table -->
            <div class="analytics-card">
                <h3>Attempt Results</h3>

                <div th:if="${#lists.isEmpty(results)}" class="empty-state">
                    <p>No attempts yet for this quiz.</p>
                </div>

                <div th:if="${!#lists.isEmpty(results)}" class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Student</th>
                                <th>Score</th>
                                <th>Total Marks</th>
                                <th>Percentage</th>
                                <th>Submitted At</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="result, iterStat : ${results}">
                                <td th:text="${iterStat.count}"></td>
                                <td th:text="${result.student.name}"></td>
                                <td th:text="${result.score}"></td>
                                <td th:text="${result.totalMarks}"></td>
                                <td>
                                    <span
                                        th:classappend="${result.percentage >= 50} ? 'badge badge-active' : 'badge badge-inactive'"
                                        th:text="${#numbers.formatDecimal(result.percentage, 1, 1)} + '%'"
                                    ></span>
                                </td>
                                <td th:text="${#temporals.format(result.submittedAt, 'dd MMM yyyy HH:mm')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Online Quiz System</p>
        </footer>
    </body>
</html>
