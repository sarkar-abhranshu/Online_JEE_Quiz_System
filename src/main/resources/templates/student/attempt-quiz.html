<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title th:text="'Attempt: ' + ${quiz.title}">Attempt Quiz</title>
        <link rel="stylesheet" th:href="@{/css/style.css}" />
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-container">
                <h1>Online JEE Quiz System</h1>
                <div class="nav-links">
                    <span th:text="${quiz.title}"></span>
                </div>
            </div>
        </nav>

        <div class="container attempt-container">

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Timer Bar -->
            <div class="timer-bar">
                <span>Time Remaining:</span>
                <span id="timer" th:data-duration="${durationMinutes}">
                    <!-- filled by timer.js -->
                </span>
            </div>

            <!-- Quiz Form -->
            <form id="quiz-form"
                  th:action="@{/student/submit/{id}(id=${attemptId})}"
                  method="post">

                <!-- Thymeleaf CSRF token -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- Questions -->
                <div th:each="question, iterStat : ${questions}" class="question-card">
                    <p class="question-number"
                       th:text="'Question ' + ${iterStat.count} + ' of ' + ${#lists.size(questions)} + '  (' + ${question.marks} + ' mark' + (${question.marks} > 1 ? 's' : '') + ')'">
                    </p>
                    <h4 th:text="${question.questionText}"></h4>

                    <!-- MCQ options -->
                    <div th:if="${question.questionType == 'MCQ'}">
                        <ul class="options-list mcq-options-list">
                            <li>
                                <label>
                                    <input type="radio"
                                           th:name="'answer_' + ${question.id}"
                                           th:value="${question.optionA}" />
                                    <span th:text="${question.optionA}"></span>
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio"
                                           th:name="'answer_' + ${question.id}"
                                           th:value="${question.optionB}" />
                                    <span th:text="${question.optionB}"></span>
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio"
                                           th:name="'answer_' + ${question.id}"
                                           th:value="${question.optionC}" />
                                    <span th:text="${question.optionC}"></span>
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio"
                                           th:name="'answer_' + ${question.id}"
                                           th:value="${question.optionD}" />
                                    <span th:text="${question.optionD}"></span>
                                </label>
                            </li>
                        </ul>
                    </div>

                    <!-- True/False options -->
                    <div th:if="${question.questionType == 'TRUE_FALSE'}">
                        <ul class="options-list">
                            <li>
                                <label>
                                    <input type="radio"
                                           th:name="'answer_' + ${question.id}"
                                           value="true" />
                                    <span>True</span>
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="radio"
                                           th:name="'answer_' + ${question.id}"
                                           value="false" />
                                    <span>False</span>
                                </label>
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- Submit -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submit-quiz-btn">Submit Quiz</button>
                </div>
            </form>
        </div>

        <footer>
            <p>&copy; 2026 Online JEE Quiz System</p>
        </footer>

        <script th:src="@{/js/timer.js}"></script>
        <script>
            (function () {
                const form = document.getElementById('quiz-form');
                const submitBtn = document.getElementById('submit-quiz-btn');
                if (!form || !submitBtn) return;

                form.addEventListener('submit', function () {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting...';
                });

                const mcqLists = document.querySelectorAll('.mcq-options-list');
                mcqLists.forEach((list) => {
                    const items = Array.from(list.children);
                    for (let i = items.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [items[i], items[j]] = [items[j], items[i]];
                    }
                    items.forEach((item) => list.appendChild(item));
                });
            })();
        </script>
    </body>
</html>
