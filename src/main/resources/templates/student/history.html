<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz History</title>
        <link rel="stylesheet" th:href="@{/css/style.css}" />
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-container">
                <h1>Online JEE Quiz System</h1>
                <div class="nav-links">
                    <a th:href="@{/student/dashboard}" class="btn btn-secondary">Dashboard</a>
                    <a th:href="@{/student/quizzes}"   class="btn btn-primary">Browse Quizzes</a>
                    <a th:href="@{/logout}"             class="btn btn-secondary">Logout</a>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="dashboard-header">
                <h2>My Quiz History</h2>
            </div>

            <div th:if="${#lists.isEmpty(results)}" class="empty-state">
                <p>You haven't completed any quizzes yet. <a th:href="@{/student/quizzes}">Take a quiz now!</a></p>
            </div>

            <div th:if="${!#lists.isEmpty(results)}" class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Quiz</th>
                            <th>Score</th>
                            <th>Total Marks</th>
                            <th>Percentage</th>
                            <th>Submitted At</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="result, iterStat : ${results}">
                            <td th:text="${iterStat.count}"></td>
                            <td th:text="${result.quiz.title}"></td>
                            <td th:text="${result.score}"></td>
                            <td th:text="${result.totalMarks}"></td>
                            <td>
                                <span
                                    th:classappend="${result.percentage >= 50} ? 'badge badge-active' : 'badge badge-inactive'"
                                    th:text="${#numbers.formatDecimal(result.percentage, 1, 1)} + '%'"
                                ></span>
                            </td>
                            <td th:text="${#temporals.format(result.submittedAt, 'dd MMM yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{/student/result/{id}(id=${result.id})}" class="btn btn-small">View</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Online JEE Quiz System</p>
        </footer>
    </body>
</html>
