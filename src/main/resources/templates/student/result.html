<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz Result</title>
        <link rel="stylesheet" th:href="@{/css/style.css}" />
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-container">
                <h1>Online Quiz System</h1>
                <div class="nav-links">
                    <a th:href="@{/student/dashboard}" class="btn btn-secondary">Dashboard</a>
                    <a th:href="@{/student/quizzes}"   class="btn btn-primary">More Quizzes</a>
                    <a th:href="@{/logout}"             class="btn btn-secondary">Logout</a>
                </div>
            </div>
        </nav>

        <div class="container">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Score Summary -->
            <div th:classappend="${result.percentage >= 50} ? 'pass' : 'fail'" class="result-summary">
                <div class="score-circle">
                    <strong th:text="${#numbers.formatDecimal(result.percentage, 1, 0)} + '%'"></strong>
                    <span>Score</span>
                </div>
                <h2 th:text="${result.quiz.title}"></h2>
                <p>
                    You scored <strong th:text="${result.score}"></strong>
                    out of <strong th:text="${result.totalMarks}"></strong> marks.
                </p>
                <p th:if="${result.percentage >= 50}" class="alert alert-success" style="display:inline-block;margin-top:0.8rem;">
                    Congratulations, you passed!
                </p>
                <p th:if="${result.percentage < 50}" class="alert alert-error" style="display:inline-block;margin-top:0.8rem;">
                    You did not pass. Keep practising!
                </p>
                <p style="margin-top:0.5rem;font-size:0.88rem;color:#777;">
                    Submitted: <span th:text="${#temporals.format(result.submittedAt, 'dd MMM yyyy HH:mm')}"></span>
                </p>
            </div>

            <!-- Answer Review -->
            <div class="answers-review">
                <div class="section-header">
                    <h3>Answer Review</h3>
                </div>

                <div th:each="answer, iterStat : ${answers}"
                     th:classappend="${answer.isCorrect} ? 'correct' : 'incorrect'"
                     class="answer-card">

                    <h5 th:text="${iterStat.count} + '. ' + ${answer.question.questionText}"></h5>

                    <p class="answer-detail"
                       th:classappend="${answer.isCorrect} ? '' : 'wrong-answer'"
                       th:text="'Your answer: ' + (${answer.studentAnswer != null} ? ${answer.studentAnswer} : 'Not answered')">
                    </p>

                    <!-- Show correct answer only when wrong -->
                    <p th:if="${!answer.isCorrect}"
                       class="answer-detail correct-answer">
                        Correct answer:
                        <span
                            th:text="${correctAnswerMap != null and #maps.containsKey(correctAnswerMap, answer.question.id) and correctAnswerMap[answer.question.id] != null and !#strings.isEmpty(correctAnswerMap[answer.question.id])} ? ${correctAnswerMap[answer.question.id]} : 'Not available'"
                        ></span>
                    </p>

                    <p class="answer-detail"
                       th:text="'Marks obtained: ' + ${answer.marksObtained} + ' / ' + ${answer.question.marks}">
                    </p>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Online Quiz System</p>
        </footer>
    </body>
</html>
