<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register - Online JEE Quiz System</title>
        <link rel="stylesheet" th:href="@{/css/style.css}" />
    </head>
    <body class="login-page">
        <div class="login-container">
            <div class="login-box">
                <h1>Online JEE Quiz System</h1>
                <h2>Student Registration</h2>

                <div th:if="${param.success}" class="alert alert-success">
                    You have been registered successfully! Please login.
                </div>

                <div th:if="${param.error}" class="alert alert-error">
                    Email already exists. Try logging in.
                </div>

                <form th:action="@{/register}" th:object="${student}" method="post">
                    <div class="form-group">
                        <label for="name">Full Name:</label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            th:field="*{name}"
                            required
                            autofocus="autofocus"
                            placeholder="Enter your full name"
                        />
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            th:field="*{email}"
                            required
                            placeholder="Enter your email"
                        />
                    </div>

                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            th:field="*{password}"
                            required
                            placeholder="Enter your password"
                        />
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Register
                    </button>
                </form>
                <p class="text-center mt-3">
                    Already have an account?
                    <a th:href="@{/login}" class="auth-switch-link">Login here</a>
                </p>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Online JEE Quiz System - OOAD Project</p>
        </footer>
    </body>
</html>
