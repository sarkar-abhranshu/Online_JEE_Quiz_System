<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Add Questions</title>
        <link rel="stylesheet" th:href="@{/css/style.css}" />
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-container">
                <h1>Online Quiz System</h1>
                <div class="nav-links">
                    <a th:href="@{/admin/dashboard}" class="btn btn-secondary"
                        >Back to Dashboard</a
                    >
                    <a th:href="@{/logout}" class="btn btn-secondary">Logout</a>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="dashboard-header">
                <h2 th:text="'Add Questions: ' + ${quiz.title}"></h2>
                <a th:href="@{/admin/dashboard}" class="btn btn-primary"
                    >Done</a
                >
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div class="form-container">
                <h2>Add New Question</h2>

                <form th:action="@{/admin/add-question/{id}(id=${quiz.id})}" method="post">
                    <div class="form-group">
                        <label for="questionType">Question Type</label>
                        <select id="questionType" name="questionType" required>
                            <option value="MCQ">Multiple Choice (MCQ)</option>
                            <option value="TRUE_FALSE">True / False</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="questionText">Question</label>
                        <textarea
                            id="questionText"
                            name="questionText"
                            rows="3"
                            required
                            placeholder="Enter question text"
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="marks">Marks</label>
                        <input
                            type="number"
                            id="marks"
                            name="marks"
                            min="1"
                            value="1"
                            required
                        />
                    </div>

                    <div id="mcqOptions" class="mcq-options visible">
                        <div class="form-group">
                            <label for="optionA">Option A</label>
                            <input type="text" id="optionA" name="optionA" />
                        </div>
                        <div class="form-group">
                            <label for="optionB">Option B</label>
                            <input type="text" id="optionB" name="optionB" />
                        </div>
                        <div class="form-group">
                            <label for="optionC">Option C</label>
                            <input type="text" id="optionC" name="optionC" />
                        </div>
                        <div class="form-group">
                            <label for="optionD">Option D</label>
                            <input type="text" id="optionD" name="optionD" />
                        </div>
                        <div class="form-group">
                            <label for="correctAnswer">Correct Answer</label>
                            <input
                                type="text"
                                id="correctAnswer"
                                name="correctAnswer"
                                placeholder="Match one option exactly"
                            />
                        </div>
                    </div>

                    <div id="trueFalseOptions" class="mcq-options">
                        <div class="form-group">
                            <label for="correctBoolean">Correct Answer</label>
                            <select id="correctBoolean" name="correctBoolean">
                                <option value="true">True</option>
                                <option value="false">False</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Add Question</button>
                        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Finish</a>
                    </div>
                </form>
            </div>

            <div class="quiz-list" style="margin-top: 1.5rem">
                <h3>Current Questions</h3>

                <div th:if="${#lists.isEmpty(questions)}" class="empty-state">
                    <p>No questions added yet.</p>
                </div>

                <div th:each="question, iterStat : ${questions}" class="question-card">
                    <div class="quiz-header">
                        <h4 th:text="'Q' + ${iterStat.count} + '. ' + ${question.questionText}"></h4>
                        <span class="badge" th:text="${question.questionType}"></span>
                    </div>

                    <div class="quiz-info">
                        <p><strong>Marks:</strong> <span th:text="${question.marks}"></span></p>
                    </div>

                    <div class="quiz-actions">
                        <form
                            th:action="@{/admin/delete-question/{id}(id=${question.id})}"
                            method="post"
                        >
                            <input type="hidden" name="quizId" th:value="${quiz.id}" />
                            <button type="submit" class="btn btn-small btn-danger">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Online Quiz System</p>
        </footer>

        <script>
            (function () {
                const typeEl = document.getElementById('questionType');
                const mcqEl = document.getElementById('mcqOptions');
                const tfEl = document.getElementById('trueFalseOptions');

                const mcqFields = [
                    document.getElementById('optionA'),
                    document.getElementById('optionB'),
                    document.getElementById('optionC'),
                    document.getElementById('optionD'),
                    document.getElementById('correctAnswer'),
                ];
                const tfField = document.getElementById('correctBoolean');

                function updateVisibility() {
                    const isMcq = typeEl.value === 'MCQ';

                    mcqEl.classList.toggle('visible', isMcq);
                    tfEl.classList.toggle('visible', !isMcq);

                    mcqFields.forEach((field) => {
                        field.required = isMcq;
                    });
                    tfField.required = !isMcq;
                }

                typeEl.addEventListener('change', updateVisibility);
                updateVisibility();
            })();
        </script>
    </body>
</html>
